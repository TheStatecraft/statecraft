<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Statecraft</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    background:#f5f5f7;
    color:#1d1d1f;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

h1{
    font-size:clamp(4rem,10vw,7rem);
    font-weight:700;
    letter-spacing:-3px;
}

p{
    margin-top:20px;
    font-size:1.5rem;
    color:#6e6e73;
    max-width:700px;
}

.button{
    margin-top:40px;
    background:#0071e3;
    color:white;
    text-decoration:none;
    padding:14px 26px;
    border-radius:999px;
    transition:.25s;
}

.button:hover{
    background:#0077ED;
}

section{
    max-width:1100px;
    margin:auto;
    padding:80px 30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 30px rgba(0,0,0,.05);
}

.card h2{
    margin-bottom:10px;
}

footer{
    text-align:center;
    padding:80px 30px;
    color:#86868b;
}

</style>

</head>

<body>

<div class="hero">

<h1>Statecraft</h1>

<p>
Technology, ideas and the future.
</p>

<a class="button" href="#articles">
Coming Soon
</a>

</div>

<section id="articles">

<div class="cards">

<div class="card">
<h2>Technology</h2>
<p>Apple, AI and the devices shaping tomorrow.</p>
</div>

<div class="card">
<h2>Ideas</h2>
<p>Thoughtful articles exploring innovation and society.</p>
</div>

<div class="card">
<h2>The Future</h2>
<p>Looking ahead at what's next.</p>
</div>

</div>

</section>

<footer>

© 2026 Statecraft

</footer>

</body>
</html>
